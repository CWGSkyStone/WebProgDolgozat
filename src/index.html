<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tomtestin</title>
  <link rel="stylesheet" href="bootstrap.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="text-center">Tomtestin</h1>
    <div>
      <form id="inputForm">
        <div>
          <label for="weight" class="form-label">Testtömeg (Kilógrammban)</label>
          <input type="text" id="weight" class="form-control" placeholder="Testtömeg (Kilógrammban)">
        </div>
        <div>
          <label for="height" class="form-label">Magasság (Méterben)</label>
          <input type="text" id="height" class="form-control" placeholder="Magasság (Méterben)">
        </div>
        <div>
          <button type="submit" class="btn btn-primary mt-3 mb-2">Számítás</button>
        </div>
        <div>
          <label for="weightIndex" class="form-label"></label>
          <input type="text" id="weightIndex" class="form-control" disabled placeholder="Testtömegindex">
        </div>
      </form>
      <div class="text-center">
        <a href="about.html">Névjegy</a>
      </div>
    </div>
  </div>
  <script src="bootstrap.js"></script>
  <script src="app.js"></script>  
</body>
</html>
